name: devshabitat
description: "DevHabitat - Developer Networking Platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.0.0
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.3.2

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.6
  firebase_messaging: ^15.2.6
  firebase_analytics: ^11.4.6

  # Authentication
  google_sign_in: ^6.1.6
  flutter_facebook_auth: ^7.1.2
  sign_in_with_apple: ^7.0.1

  # Routing
  go_router: ^15.1.3

  # UI
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0

  # Utils
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  intl: ^0.20.2
  logger: ^2.0.2+1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.2
  internet_connection_checker: ^3.0.1
  http: ^1.2.1
  image_cropper: ^5.0.1

dependency_overrides:
  flutter_facebook_auth_platform_interface: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  freezed: ^3.0.6
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3
  analyzer: ^7.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
